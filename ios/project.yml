name: Jamii
options:
  bundleIdPrefix: com.bluscelabs
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15"
  createIntermediateGroups: true

settings:
  SWIFT_VERSION: "5.9"
  MARKETING_VERSION: "0.28.6"
  CURRENT_PROJECT_VERSION: "1"
  PRODUCT_BUNDLE_IDENTIFIER: com.bluscelabs.jamii
  DEVELOPMENT_TEAM: ""  # Set your Apple Team ID here
  CODE_SIGN_STYLE: Automatic
  IPHONEOS_DEPLOYMENT_TARGET: "16.0"

targets:
  Jamii:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: Jamii/App
      - path: Jamii/Views
      - path: Jamii/Models
      - path: Jamii/Services
    resources:
      - path: Jamii/Resources/Assets.xcassets
      - path: Jamii/Resources/Info.plist
        buildPhase: none
    settings:
      INFOPLIST_FILE: Jamii/Resources/Info.plist
      PRODUCT_BUNDLE_IDENTIFIER: com.bluscelabs.jamii
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
      SWIFT_VERSION: "5.9"
      IPHONEOS_DEPLOYMENT_TARGET: "16.0"
      CODE_SIGN_STYLE: Automatic
